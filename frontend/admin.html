<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Ranked Choice Voting</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <span class="brand">RCV</span>
    <a href="vote.html">Vote</a>
    <a href="results.html">Results</a>
    <a href="admin.html">Admin</a>
  </nav>

  <div class="container">
    <h1>Survey Admin</h1>

    <div id="admin-gate" class="card">
      <div class="form-group">
        <label for="admin-code">Admin Code</label>
        <input type="password" id="admin-code" placeholder="Enter admin code" autocomplete="off">
      </div>
      <button class="btn btn-primary" id="admin-login-btn">Unlock</button>
    </div>

    <div id="admin-panel" class="hidden">
      <div class="card">
        <h2>Survey Items</h2>
        <div class="form-group" style="display:flex;gap:8px;">
          <input type="text" id="new-item" placeholder="Add a new item..." style="flex:1;">
          <button class="btn btn-primary" id="add-item-btn">Add</button>
        </div>
        <ul class="item-list" id="item-list"></ul>
      </div>

      <div class="card">
        <h2>Manage Votes</h2>
        <p class="mb-2">Remove individual votes (e.g. duplicates).</p>
        <ul class="item-list" id="vote-list"></ul>
      </div>

      <div class="card">
        <h2>Reset Survey</h2>
        <p class="mb-2">Clear all votes to start a fresh round. Optionally clear the survey items too.</p>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-danger" id="clear-votes-btn">Clear All Votes</button>
          <button class="btn btn-danger" id="clear-all-btn">Clear Votes &amp; Items</button>
        </div>
        <p id="reset-status" class="mt-2" style="display:none;"></p>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
