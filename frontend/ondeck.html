    <a href="songs.html">Songs</a>
    <a href="ondeck.html">On Deck</a>
    <a href="vote.html">Vote</a>

  <div class="container">
    <h1>On Deck</h1>
    <p class="mb-2">These songs were voted to the top and are being learned.</p>

    <div class="card">
      <div id="ondeck-list">
        <p>Loading...</p>
      </div>
    </div>

    <!-- Admin section -->
    <div id="admin-gate" class="card">
      <h2>Manage On Deck</h2>
      <div class="form-group">
        <label for="admin-code">Admin Code</label>
        <input type="password" id="admin-code" placeholder="Enter admin code" autocomplete="off">
      </div>
      <button class="btn btn-primary" id="admin-login-btn">Unlock</button>
    </div>

    <div id="admin-panel" class="hidden">
      <div class="card">
        <h2>Move to Current Songs</h2>
        <p class="mb-2">Promote an on-deck song to the Current Songs list.</p>
        <ul class="item-list" id="admin-ondeck-list"></ul>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/ondeck.js"></script>
</body>
